# Stream-layer SNI routing when another TLS service must continue to share
# public 443 with Edge Scanner.
#
# Requirements:
# - nginx.conf contains a top-level block:
#     stream {
#         include /etc/nginx/stream-conf.d/*.conf;
#     }
# - Edge Scanner TLS backend listens only on 127.0.0.1:8443
# - The existing TLS service (for example x-ui/xray) listens only on 127.0.0.1:1443
#
# Replace:
# - edge.example.com
# - backend ports if you use different local bindings

map $ssl_preread_server_name $tls_backend {
    edge.example.com edge_scanner_tls_backend;
    default existing_tls_backend;
}

upstream edge_scanner_tls_backend {
    server 127.0.0.1:8443;
}

upstream existing_tls_backend {
    server 127.0.0.1:1443;
}

server {
    listen 443;
    listen [::]:443;
    proxy_pass $tls_backend;
    ssl_preread on;
    proxy_connect_timeout 5s;
    proxy_timeout 24h;
}
