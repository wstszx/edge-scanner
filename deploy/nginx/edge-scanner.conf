# Bootstrap HTTP-only reverse proxy for the common case where Edge Scanner owns
# public 80/443 directly and you will let certbot add the TLS server block.
#
# If another TLS service already owns public 443 (for example x-ui/xray), keep
# this file for initial HTTP validation only and use:
# - deploy/nginx/edge-scanner-shared-443-site.conf
# - deploy/nginx/edge-scanner-shared-443-stream.conf

upstream edge_scanner_upstream {
    server 127.0.0.1:5000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        proxy_pass http://edge_scanner_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
