# HTTP redirect + local-only TLS backend for the case where public 443 is
# multiplexed in the Nginx stream layer.
#
# Replace:
# - edge.example.com
# - the local backend port if you do not want 8443
#
# Requirements:
# - public 80 stays on Nginx for ACME HTTP-01
# - public 443 is handled by deploy/nginx/edge-scanner-shared-443-stream.conf
# - a certificate already exists at /etc/letsencrypt/live/edge.example.com/

upstream edge_scanner_upstream {
    server 127.0.0.1:5000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name edge.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 127.0.0.1:8443 ssl http2;
    server_name edge.example.com;

    ssl_certificate /etc/letsencrypt/live/edge.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edge.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://edge_scanner_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
